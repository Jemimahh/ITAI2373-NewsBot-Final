<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsBot Intelligence System 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0c0e1a;
      --surface:  #131628;
      --border:   #1e2240;
      --accent:   #d4a843;
      --accent2:  #4fc3f7;
      --text:     #e8e4d9;
      --muted:    #6b7280;
      --positive: #6fcf97;
      --negative: #eb5757;
      --neutral:  #9b9b9b;
      --tech:     #4fc3f7;
      --business: #81c784;
      --politics: #e57373;
      --sport:    #ffb74d;
      --entertainment: #ce93d8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    header .logo span { color: var(--text); }
    header .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      background: var(--border);
      color: var(--accent2);
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 1px;
    }
    header .status {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    header .status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--positive);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 0;
      height: calc(100vh - 61px);
    }

    /* ── Left panel ── */
    .left-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .input-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .input-section label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
      margin-bottom: 10px;
    }
    .input-section select {
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: 1px solid #2a2f52;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 10px;
      outline: none;
    }
    textarea {
      width: 100%;
      background: var(--border);
      color: var(--text);
      border: 1px solid #2a2f52;
      border-radius: 6px;
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      min-height: 160px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .btn-primary {
      background: var(--accent);
      color: #0c0e1a;
      flex: 1;
    }
    .btn-primary:hover { background: #e0b85a; }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: #2a2f52; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Results ── */
    .results-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .results-section:empty::after {
      content: "Paste or type an article above, then click Analyze";
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      display: block;
      text-align: center;
      margin-top: 60px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-card h3 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Sentiment bar */
    .sentiment-label {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .sentiment-label.Positive { color: var(--positive); }
    .sentiment-label.Negative { color: var(--negative); }
    .sentiment-label.Neutral  { color: var(--neutral); }

    .score-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .score-bar-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; width: 52px; color: var(--muted); }
    .score-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .score-bar-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); width: 36px; text-align: right; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--border);
      color: var(--text);
    }
    .tag.PERSON { border-left: 2px solid var(--tech); }
    .tag.ORG    { border-left: 2px solid var(--accent); }
    .tag.GPE    { border-left: 2px solid var(--positive); }
    .tag.LOC    { border-left: 2px solid var(--entertainment); }

    /* Language pill */
    .lang-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }
    .lang-code {
      background: var(--accent2);
      color: var(--bg);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 600;
    }
    .conf-badge {
      color: var(--muted);
      font-size: 10px;
    }

    /* Summary */
    .summary-text {
      line-height: 1.7;
      color: var(--text);
      font-size: 13px;
      border-left: 2px solid var(--accent);
      padding-left: 12px;
    }
    .compression-badge {
      margin-top: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .compression-badge span { color: var(--accent2); }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.15s;
      border-bottom: 2px solid transparent;
      text-transform: uppercase;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* ── Translate tab ── */
    .lang-select-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .lang-select-row select {
      flex: 1;
      background: var(--border);
      color: var(--text);
      border: 1px solid #2a2f52;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .translated-text {
      background: var(--border);
      border-radius: 6px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      flex: 1;
      min-height: 120px;
      color: var(--text);
    }

    /* ── Query tab ── */
    .query-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .query-input-row input {
      flex: 1;
      background: var(--border);
      color: var(--text);
      border: 1px solid #2a2f52;
      border-radius: 6px;
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .query-input-row input:focus { border-color: var(--accent); }
    .query-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
    }
    .intent-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      background: var(--accent);
      color: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: inline-block;
    }

    /* ── Chat tab ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-messages:empty::after {
      content: "Ask anything about the article in the left panel";
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      text-align: center;
      margin-top: 40px;
    }
    .bubble {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
    }
    .bubble.user {
      background: var(--accent);
      color: var(--bg);
      align-self: flex-end;
      border-bottom-right-radius: 3px;
      font-weight: 500;
    }
    .bubble.bot {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row input {
      flex: 1;
      background: var(--border);
      color: var(--text);
      border: 1px solid #2a2f52;
      border-radius: 6px;
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .chat-input-row input:focus { border-color: var(--accent); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: var(--negative);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: rgba(235, 87, 87, 0.08);
      padding: 10px 12px;
      border-radius: 6px;
      border-left: 2px solid var(--negative);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">NewsBot<span> 2.0</span></div>
  <div class="badge">ITAI 2373</div>
  <div class="status">
    <span class="dot"></span>
    NLP SYSTEM READY
  </div>
</header>

<div class="layout">

  <!-- ── LEFT PANEL ── -->
  <div class="left-panel">
    <div class="input-section">
      <label>Category (optional)</label>
      <select id="categorySelect">
        <option value="">— Auto-detect —</option>
        <option value="tech">Technology</option>
        <option value="business">Business</option>
        <option value="politics">Politics</option>
        <option value="sport">Sport</option>
        <option value="entertainment">Entertainment</option>
      </select>

      <label>Article Text</label>
      <textarea id="articleText" placeholder="Paste a news article here..."></textarea>

      <div class="btn-row">
        <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeArticle()">Analyze Article</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="results-section" id="resultsSection"></div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('summarize', this)">Summarize</button>
      <button class="tab-btn" onclick="switchTab('translate', this)">Translate</button>
      <button class="tab-btn" onclick="switchTab('query', this)">Query</button>
      <button class="tab-btn" onclick="switchTab('chat', this)">Chat</button>
    </div>

    <!-- SUMMARIZE TAB -->
    <div class="tab-content active" id="tab-summarize">
      <button class="btn btn-primary" style="margin-bottom:14px;" onclick="summarizeArticle()">Generate Summary</button>
      <div id="summaryResult" style="flex:1;"></div>
    </div>

    <!-- TRANSLATE TAB -->
    <div class="tab-content" id="tab-translate">
      <div class="lang-select-row">
        <select id="targetLang">
          <option value="fr">🇫🇷 French</option>
          <option value="de">🇩🇪 German</option>
          <option value="es">🇪🇸 Spanish</option>
          <option value="pt">🇧🇷 Portuguese</option>
          <option value="it">🇮🇹 Italian</option>
          <option value="ar">🇸🇦 Arabic</option>
          <option value="zh-CN">🇨🇳 Chinese</option>
          <option value="ja">🇯🇵 Japanese</option>
          <option value="ru">🇷🇺 Russian</option>
        </select>
        <button class="btn btn-primary" onclick="translateArticle()">Translate</button>
      </div>
      <div class="translated-text" id="translatedText" style="color:var(--muted);">
        Translation will appear here…
      </div>
    </div>

    <!-- QUERY TAB -->
    <div class="tab-content" id="tab-query">
      <p style="color:var(--muted);font-size:12px;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;">
        Try: "Show me positive tech news" or "Find articles about interest rates"
      </p>
      <div class="query-input-row">
        <input type="text" id="queryInput" placeholder="Enter a natural language query…"
               onkeydown="if(event.key==='Enter') processQuery()">
        <button class="btn btn-primary" onclick="processQuery()">Query</button>
      </div>
      <div id="queryResult"></div>
    </div>

    <!-- CHAT TAB -->
    <div class="tab-content" id="tab-chat">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput"
               placeholder="Ask about the article…"
               onkeydown="if(event.key==='Enter') sendChat()">
        <button class="btn btn-primary" onclick="sendChat()">Send</button>
        <button class="btn btn-secondary" onclick="resetChat()" title="Clear history">↺</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── Tab switcher ──────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── Analyze ───────────────────────────────────────────────────────────────
async function analyzeArticle() {
  const text = document.getElementById('articleText').value.trim();
  if (!text) return alert('Please paste an article first.');

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analyzing…';

  const results = document.getElementById('resultsSection');
  results.innerHTML = '';

  try {
    const res  = await fetch('/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Sentiment card
    const sentColor = { Positive: '#6fcf97', Negative: '#eb5757', Neutral: '#9b9b9b' };
    results.innerHTML += `
      <div class="result-card">
        <h3>Sentiment Analysis</h3>
        <div class="sentiment-label ${data.sentiment_label}">${data.sentiment_label}</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:12px;">
          compound score: <span style="color:${sentColor[data.sentiment_label]}">${data.sentiment_compound}</span>
        </div>
        ${bar('Positive', data.positive, '#6fcf97')}
        ${bar('Neutral',  data.neutral,  '#9b9b9b')}
        ${bar('Negative', data.negative, '#eb5757')}
      </div>`;

    // Language card
    results.innerHTML += `
      <div class="result-card">
        <h3>Language Detection</h3>
        <div class="lang-pill">
          <span class="lang-code">${data.language_code.toUpperCase()}</span>
          ${data.language}
          <span class="conf-badge">${(data.language_confidence * 100).toFixed(0)}% confidence</span>
        </div>
      </div>`;

    // Entities card
    if (data.entities && data.entities.length > 0) {
      const tags = data.entities.map(e =>
        `<span class="tag ${e.type}" title="${e.type}">${e.text}</span>`
      ).join('');
      results.innerHTML += `
        <div class="result-card">
          <h3>Named Entities</h3>
          <div class="tags">${tags}</div>
          <div style="margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);">
            Border color: <span style="color:var(--tech)">■</span> PERSON
            <span style="color:var(--accent)">■</span> ORG
            <span style="color:var(--positive)">■</span> GPE/LOC
          </div>
        </div>`;
    }

    // Stats card
    results.innerHTML += `
      <div class="result-card">
        <h3>Document Stats</h3>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:2;color:var(--muted);">
          Word count    <span style="color:var(--text)">${data.word_count}</span><br>
          Category hint <span style="color:var(--text)">${document.getElementById('categorySelect').value || 'auto'}</span>
        </div>
      </div>`;

  } catch (err) {
    results.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = 'Analyze Article';
}

function bar(label, val, color) {
  return `<div class="score-bar-row">
    <span class="score-bar-label">${label}</span>
    <div class="score-bar"><div class="score-bar-fill" style="width:${(val*100).toFixed(1)}%;background:${color}"></div></div>
    <span class="score-bar-val">${val.toFixed(2)}</span>
  </div>`;
}

// ── Summarize ─────────────────────────────────────────────────────────────
async function summarizeArticle() {
  const text     = document.getElementById('articleText').value.trim();
  const category = document.getElementById('categorySelect').value;
  const out      = document.getElementById('summaryResult');
  if (!text) { out.innerHTML = '<div class="error-msg">Paste an article first.</div>'; return; }

  out.innerHTML = '<span class="spinner"></span> Generating summary via llama3.2…';
  try {
    const res  = await fetch('/summarize', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text, category })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    out.innerHTML = `
      <div class="result-card">
        <h3>Abstractive Summary</h3>
        <p class="summary-text">${data.summary}</p>
        <div class="compression-badge">
          <span>${data.word_count}</span> words &nbsp;·&nbsp;
          compression ratio <span>${(data.compression_ratio * 100).toFixed(0)}%</span>
        </div>
      </div>`;
  } catch (err) {
    out.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
  }
}

// ── Translate ─────────────────────────────────────────────────────────────
async function translateArticle() {
  const text       = document.getElementById('articleText').value.trim();
  const targetLang = document.getElementById('targetLang').value;
  const out        = document.getElementById('translatedText');
  if (!text) { out.innerHTML = 'Paste an article first.'; return; }

  out.innerHTML = '<span class="spinner"></span> Translating…';
  out.style.color = 'var(--muted)';
  try {
    const res  = await fetch('/translate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text: text.substring(0, 1500), target_lang: targetLang })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    out.innerHTML = data.translated_text;
    out.style.color = 'var(--text)';
  } catch (err) {
    out.innerHTML = `⚠ ${err.message}`;
    out.style.color = 'var(--negative)';
  }
}

// ── Query ─────────────────────────────────────────────────────────────────
async function processQuery() {
  const q   = document.getElementById('queryInput').value.trim();
  const out = document.getElementById('queryResult');
  if (!q) return;

  out.innerHTML = '<span class="spinner"></span>';
  try {
    const res  = await fetch('/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ query: q })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const filterStr = Object.entries(data.filters)
      .map(([k, v]) => `<span class="tag">${k}: ${v}</span>`).join(' ');

    out.innerHTML = `
      <div class="query-result">
        <div class="intent-badge">${data.intent.replace(/_/g,' ')}</div>
        <p style="margin:8px 0;font-size:13px;">${data.response}</p>
        ${filterStr ? '<div class="tags" style="margin-top:8px;">' + filterStr + '</div>' : ''}
      </div>`;
  } catch (err) {
    out.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
  }
}

// ── Chat ──────────────────────────────────────────────────────────────────
async function sendChat() {
  const input    = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question) return;

  const article = document.getElementById('articleText').value.trim();
  const messages = document.getElementById('chatMessages');

  // Add user bubble
  messages.innerHTML += `<div class="bubble user">${question}</div>`;
  input.value = '';

  // Thinking indicator
  const thinkId = 'think-' + Date.now();
  messages.innerHTML += `<div class="bubble bot" id="${thinkId}"><span class="spinner"></span> Thinking…</div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        question,
        article,
        category: document.getElementById('categorySelect').value
      })
    });
    const data = await res.json();
    document.getElementById(thinkId).remove();
    if (data.error) throw new Error(data.error);
    messages.innerHTML += `<div class="bubble bot">${data.answer}</div>`;
  } catch (err) {
    document.getElementById(thinkId).remove();
    messages.innerHTML += `<div class="bubble bot" style="color:var(--negative);">⚠ ${err.message}</div>`;
  }

  messages.scrollTop = messages.scrollHeight;
}

async function resetChat() {
  await fetch('/reset_chat', { method: 'POST' });
  document.getElementById('chatMessages').innerHTML = '';
}

function clearAll() {
  document.getElementById('articleText').value = '';
  document.getElementById('resultsSection').innerHTML = '';
  document.getElementById('summaryResult').innerHTML = '';
  document.getElementById('translatedText').innerHTML = 'Translation will appear here…';
  document.getElementById('translatedText').style.color = 'var(--muted)';
  document.getElementById('queryResult').innerHTML = '';
  document.getElementById('chatMessages').innerHTML = '';
  resetChat();
}
</script>
